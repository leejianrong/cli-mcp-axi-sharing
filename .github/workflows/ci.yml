name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the in-progress run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ci-demo

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ci-demo/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ci-demo/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Syntax-check the standalone .mjs scripts (not covered by tsc). Cheap guard
      # against a broken script landing on main.
      - name: Syntax-check standalone scripts
        run: |
          node --check scripts/agent-run.mjs
          node --check scripts/validate-recording.mjs
          node --check ../viz/serve.mjs
      # Runs the vitest suite, which includes the validator test that guards every
      # committed recording against schema drift.
      - run: pnpm test

  measure:
    name: Token-diff smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ci-demo/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Regenerates payloads from a clean state and prints the token table.
      # Guards the capture + token-diff path against rot. Fully offline.
      - run: node scripts/token-diff.mjs
