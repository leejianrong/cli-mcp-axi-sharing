name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the in-progress run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ci-demo

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ci-demo/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ci-demo/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
