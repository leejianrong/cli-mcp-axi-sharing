name: Deploy slides to Pages

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # The deck is a static, self-contained folder — no build step.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: slides
      - id: deployment
        uses: actions/deploy-pages@v4
